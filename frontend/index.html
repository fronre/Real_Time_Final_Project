<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumCore Elite | Terminal V4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --gold: #D4AF37;
            --bg: #020202;
            --card-bg: rgba(10, 10, 10, 0.9);
            --neon-gold: rgba(212, 175, 55, 0.3);
            --emerald: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #eeeeee;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #020202 100%);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.1);
        }

        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #F4D03F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-header { font-size: 9px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 0.2em; display: flex; align-items: center; gap: 8px; }

        /* تنسيق الـ Scrollbar الاحترافي */
        #logs::-webkit-scrollbar, #marketList::-webkit-scrollbar { width: 4px; }
        #logs::-webkit-scrollbar-track, #marketList::-webkit-scrollbar-track { background: transparent; }
        #logs::-webkit-scrollbar-thumb, #marketList::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }

        @keyframes flash-up { 0% { border-color: var(--emerald); } 100% { border-color: rgba(255,255,255,0.05); } }
        @keyframes flash-down { 0% { border-color: #ef4444; } 100% { border-color: rgba(255,255,255,0.05); } }
        .up-trend { animation: flash-up 1s ease-out; }
        .down-trend { animation: flash-down 1s ease-out; }
    </style>
</head>
<body class="p-6 h-screen">

    <div class="max-w-[1850px] mx-auto h-full flex flex-col gap-5">
        <header class="flex justify-between items-center border-b border-white/5 pb-4">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-white/5 rounded-lg border border-white/10">
                    <div class="w-6 h-6 bg-gold rounded-sm rotate-45 shadow-[0_0_10px_#D4AF37]"></div>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-[0.2em] uppercase">Quantum<span class="gold-gradient">Core</span></h1>
                    <p class="text-[8px] text-gray-600 font-mono tracking-[0.5em]">ALGORITHMIC TRADING TERMINAL</p>
                </div>
            </div>

            <div class="flex gap-12">
                <div class="text-right">
                    <p class="stat-header"><i class="fas fa-layer-group"></i> Trades</p>
                    <p id="tradeCount" class="text-xl font-bold mono">0</p>
                </div>
                <div class="text-right">
                    <p class="stat-header text-emerald-500"><i class="fas fa-bullseye"></i> Success Rate</p>
                    <p id="winRate" class="text-xl font-bold text-emerald-400 mono">0%</p>
                </div>
                <div class="text-right">
                    <p class="stat-header"><i class="far fa-clock"></i> System Time</p>
                    <p id="uptime" class="text-xl font-bold mono">00:00:00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-5 flex-1 overflow-hidden">
            <aside class="col-span-3 glass-panel rounded-3xl p-5 flex flex-col overflow-hidden">
                <h3 class="stat-header mb-5 border-b border-white/5 pb-2">Market Assets</h3>
                <div id="marketList" class="flex-1 overflow-y-auto space-y-2"></div>
            </aside>

            <main class="col-span-6 flex flex-col gap-5">
                <div class="grid grid-cols-3 gap-5">
                    <div class="glass-panel rounded-2xl p-5">
                        <p class="stat-header mb-1">Liquidity</p>
                        <h2 id="balance" class="text-2xl font-bold mono">$0.00</h2>
                    </div>

                    <div class="glass-panel rounded-2xl p-5 border-r-4 border-emerald-500/50">
                        <p class="stat-header mb-1 text-emerald-500">Total Profit</p>
                        <h2 id="totalProfit" class="text-2xl font-bold text-emerald-400 mono">$0.00</h2>
                    </div>

                    <div class="glass-panel rounded-2xl p-5 border-r-4 border-gold/30">
                        <p class="stat-header mb-1">Net Realized</p>
                        <h2 id="pnl" class="text-2xl font-bold gold-gradient mono">$0.00</h2>
                    </div>
                </div>

                <div class="glass-panel rounded-[2.5rem] p-8 flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h3 id="activeAsset" class="text-sm font-bold tracking-widest gold-gradient uppercase">Initializing...</h3>
                        <span id="connectionStatus" class="text-[8px] bg-red-500/20 px-3 py-1 rounded-full text-red-500 border border-red-500/20">DISCONNECTED</span>
                    </div>
                    <div class="flex-1"><canvas id="mainChart"></canvas></div>
                </div>
            </main>

            <aside class="col-span-3 flex flex-col gap-5 overflow-hidden">
                <div class="glass-panel rounded-3xl p-6 flex flex-col items-center">
                    <h3 class="stat-header mb-4 w-full text-left">Asset Allocation</h3>
                    <div style="height: 180px; width: 180px;"><canvas id="portfolioChart"></canvas></div>
                </div>
                <div class="glass-panel rounded-3xl p-5 flex-1 flex flex-col overflow-hidden">
                    <h3 class="stat-header mb-4 border-b border-white/5 pb-2">Execution Logs</h3>
                    <div id="logs" class="flex-1 overflow-y-auto space-y-2"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        let charts = {};
        const state = { start: Date.now(), prices: {} };

        const setupCharts = () => {
            const mainCtx = document.getElementById('mainChart').getContext('2d');
            charts.main = new Chart(mainCtx, {
                type: 'line',
                data: { labels: Array(50).fill(''), datasets: [{
                    data: [], borderColor: '#D4AF37', borderWidth: 2, fill: true,
                    backgroundColor: 'rgba(212, 175, 55, 0.05)', tension: 0.4, pointRadius: 0
                }] },
                options: { responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#555' } } },
                    plugins: { legend: { display: false } }
                }
            });

            charts.port = new Chart(document.getElementById('portfolioChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#D4AF37', '#ffffff', '#222', '#444'], borderWidth: 0 }] },
                options: { cutout: '82%', plugins: { legend: { display: false } } }
            });
        };

        const updateData = (d) => {
            if (!d) return;

            // تحديث الأرقام الأساسية
            document.getElementById('balance').innerText = `$${Number(d.balance).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('pnl').innerText = `$${Number(d.pnl).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            // إصلاح مشكلة Total Profit
            if (d.total_profit !== undefined) {
                const tp = document.getElementById('totalProfit');
                tp.innerText = `$${Number(d.total_profit).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                tp.classList.toggle('text-emerald-400', d.total_profit >= 0);
                tp.classList.toggle('text-red-400', d.total_profit < 0);
            }

            document.getElementById('tradeCount').innerText = d.trade_count;
            document.getElementById('winRate').innerText = `${d.win_rate}%`;
            document.getElementById('activeAsset').innerText = d.symbol.replace('_', ' ');

            // تحديث قائمة الأصول
            const list = document.getElementById('marketList');
            Object.entries(d.all_prices).forEach(([sym, prc]) => {
                let row = document.getElementById(`row-${sym}`);
                if (!row) {
                    row = document.createElement('div');
                    row.id = `row-${sym}`;
                    row.className = "flex justify-between p-3 rounded-xl bg-white/5 border border-white/5 transition-all duration-500";
                    list.appendChild(row);
                }
                const old = state.prices[sym] || prc;
                if (prc > old) { row.classList.add('up-trend'); setTimeout(()=>row.classList.remove('up-trend'), 800); }
                else if (prc < old) { row.classList.add('down-trend'); setTimeout(()=>row.classList.remove('down-trend'), 800); }
                state.prices[sym] = prc;
                row.innerHTML = `<span class="text-[10px] font-bold text-gray-400 uppercase">${sym.replace('_',' ')}</span>
                                 <span class="mono text-xs ${prc>=old?'text-emerald-400':'text-red-400'}">$${prc.toLocaleString()}</span>`;
            });

            // تحديث التشارت
            charts.main.data.datasets[0].data.push(d.price);
            if (charts.main.data.datasets[0].data.length > 50) charts.main.data.datasets[0].data.shift();
            charts.main.update('none');

            if (d.portfolio && Object.keys(d.portfolio).length > 0) {
                charts.port.data.labels = Object.keys(d.portfolio);
                charts.port.data.datasets[0].data = Object.values(d.portfolio);
                charts.port.update();
            }
        };

        const connect = () => {
            // محاولة الاتصال بـ localhost
            const socket = new WebSocket('ws://127.0.0.1:8000/ws');
            const status = document.getElementById('connectionStatus');

            socket.onopen = () => {
                status.innerText = "CONNECTED";
                status.className = "text-[8px] bg-emerald-500/20 px-3 py-1 rounded-full text-emerald-500 border border-emerald-500/20";
            };

            socket.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'update') updateData(msg);
                if (msg.type === 'order') {
                    const container = document.getElementById('logs');
                    const el = document.createElement('div');
                    const isBuy = msg.order_type === 'BUY';
                    el.className = `p-3 rounded-xl bg-white/5 border-l-2 ${isBuy?'border-emerald-500':'border-red-500'} mb-2 text-[9px]`;
                    el.innerHTML = `<div class="flex justify-between font-bold opacity-70"><span>${msg.order_type} EXECUTION</span><span>${new Date().toLocaleTimeString()}</span></div>
                                    <div class="flex justify-between mt-1"><span>${msg.symbol}</span><span class="mono">${msg.pnl?`$${msg.pnl}`:'OPENED'}</span></div>`;
                    container.prepend(el);
                    if (container.children.length > 15) container.lastChild.remove();
                }
            };

            socket.onclose = () => {
                status.innerText = "RECONNECTING...";
                status.className = "text-[8px] bg-yellow-500/20 px-3 py-1 rounded-full text-yellow-500 border border-yellow-500/20";
                setTimeout(connect, 2000);
            };
        };

        window.onload = () => {
            setupCharts();
            connect();
            const timer = () => {
                const diff = Math.floor((Date.now() - state.start) / 1000);
                const pad = (n) => String(n).padStart(2, '0');
                document.getElementById('uptime').innerText = `${pad(Math.floor(diff/3600))}:${pad(Math.floor((diff%3600)/60))}:${pad(diff%60)}`;
                requestAnimationFrame(timer);
            };
            timer();
        };
    </script>
</body>
</html>
