version: '3.8'

services:
  # 1. C Bot: محاكي السوق المكتوب بلغة C
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: trading-bot
    ports:
      - "8080:8080"
    networks:
      - trading-network
    restart: unless-stopped

  # 2. Python Server: محرك التداول بخوارزمية EDF-VD
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: trading-server
    ports:
      - "8000:8000"
    networks:
      - trading-network
    depends_on:
      - bot
    restart: unless-stopped
    environment:
      - BOT_HOST=bot
      - BOT_PORT=8080
      - PYTHONUNBUFFERED=1

  # 3. Frontend: واجهة العرض (Nginx)
  frontend:
    image: nginx:alpine
    container_name: trading-frontend
    ports:
      - "3000:80"
    networks:
      - trading-network
    depends_on:
      - server
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      # ربط ملف الإعدادات كملف (وليس مجلد) لتجنب خطأ OCI runtime
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  trading-network:
    driver: bridge